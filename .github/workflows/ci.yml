name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build and smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib binutils nasm qemu-system-x86

      - name: Install dependencies on macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm binutils nasm qemu

      - name: Show tools
        run: make tools

      - name: Build images
        run: make clean all

      - name: QEMU smoke test
        run: make smoke SMOKE_SECONDS=5
